[phases.setup]
nixPkgs = ["php82", "php82Extensions.intl", "php82Packages.composer", "nodejs_20"]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "npm ci",
    "npm run build"
]

[start]
cmd = "php artisan config:clear && php artisan serve --host=0.0.0.0 --port=$PORT"